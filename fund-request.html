<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/fund-request.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
    <div id="header">

    </div>

    <div class="Request">
        <p>Request wallet funding after successful bank transfer.</p>
    </div>
    <div  class="form-container">
    <form>
        <div class="form-group">
        <label style="font-size: 15px; font-family: sans-serif;">Amount</label>
        <input type="number" step="0.1" class="amount">
    </div>
        <div class="form-group">
        <label style="font-size: 15px;  font-family: sans-serif;">Depositor</label>
        <input type="text" placeholder="Depositor's Fullname">
     </div>
     <div  class="form-group">
        <label style="font-size: 15px;  font-family: sans-serif;">Description</label>
        <textarea name="" id="" cols="" rows="4" placeholder="Payment Description.This can also include teller no. transaction id e.t.c." style="border-radius: 5px;"></textarea>
    </div>
    <div  class="form-group" style="position: relative;">
        <label style="font-size: 15px;  font-family: sans-serif;">Date Paid</label>
        <input type="text" placeholder="Date Paid"  id="dateinput" onclick="showdate()">
        <span class="icon-inside" id="calendericon" ><i class="fa-solid fa-calendar-days"></i></span>
        <input type="date" id="hiddendate" onchange="sum()" style="display: block; position: absolute; top: -1%; z-index: -2;">
    </div>
        <button type="submit" class="btn">Continue</button>
    </form>
</div>

    <div id="footer" style="background-color: white;">
        
    </div>
</body>
</html>
<script src="dashboard.js">
</script>

<script>
   const dateInput = document.getElementById("dateinput")
   const calenderIcon = document.getElementById("calendericon")
   const hiddendate = document.getElementById("hiddendate")

   function showdate(){
    hiddendate.showPicker();
  }
  function sum() {
    dateInput.value = hiddendate.value;
  }
</script>
